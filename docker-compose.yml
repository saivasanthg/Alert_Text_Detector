version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: alert_postgres_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=alert_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alert_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  live-pipeline-engine:
    build: ./backend
    container_name: live_social_engine
    ports:
      - "5000:5000"
    volumes:
      - "C:/Users/gsvas/OneDrive/Desktop/AlertTextDetector/Model:/workspace/model"
    environment:
      - DB_HOST=db
      - DB_NAME=alert_db
      - DB_USER=postgres
      - DB_PASSWORD=secret123
      - PYTHONUNBUFFERED=1      
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: live_social_frontend
    ports:
      - "8501:8501"
    depends_on:
      - live-pipeline-engine

volumes:
  pgdata: